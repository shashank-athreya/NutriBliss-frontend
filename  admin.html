<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="
        default-src * 'self' data: blob:;
        connect-src *;
        script-src * 'unsafe-inline' 'unsafe-eval';
        style-src * 'unsafe-inline';
        img-src * data:;
    ">

    <title>Admin Panel</title>

    <script>
        if (localStorage.getItem("admin") !== "true") {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 300px;
        }

        button {
            margin: 5px;
            padding: 6px 10px;
            cursor: pointer;
        }

        li {
            margin-bottom: 15px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            list-style: none;
        }

        .top-bar {
            margin-bottom: 20px;
        }

        .top-bar a {
            margin-left: 10px;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <button onclick="logout()">Logout</button>
    <a href="admin-orders.html">Go to Orders</a>
</div>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<button onclick="addProduct()">Add Product</button>

<h3>All Products</h3>
<ul id="admin-products"></ul>

<script>
const BASE_URL = "https://nutribliss-backend-3.onrender.com";

window.onload = loadProducts;

async function addProduct() {
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const image = document.getElementById("image").value.trim();

    if (!name || !price) {
        alert("Name and price are required");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/products`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, price, image })
        });

        if (!res.ok) {
            throw new Error("Failed to add product");
        }

        alert("Product added successfully 🚀");

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        loadProducts();
    } catch (err) {
        console.error("Add product error:", err);
        alert("Error adding product ❌");
    }
}

async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    try {
        await fetch(`${BASE_URL}/products/${id}`, {
            method: "DELETE"
        });

        loadProducts();
    } catch (err) {
        console.error("Delete error:", err);
    }
}

async function editProduct(id, name, price, image) {
    const newName = prompt("New name:", name);
    const newPrice = prompt("New price:", price);
    const newImage = prompt("New image URL:", image);

    if (!newName || !newPrice) return;

    try {
        await fetch(`${BASE_URL}/products/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: newName,
                price: newPrice,
                image: newImage
            })
        });

        loadProducts();
    } catch (err) {
        console.error("Edit error:", err);
    }
}

async function loadProducts() {
    const list = document.getElementById("admin-products");
    list.innerHTML = "Loading...";

    try {
        const res = await fetch(`${BASE_URL}/products`);

        if (!res.ok) {
            throw new Error("Failed to fetch products");
        }

        const data = await res.json();
        list.innerHTML = "";

        if (!data || data.length === 0) {
            list.innerHTML = "<li>No products found</li>";
            return;
        }

        data.forEach((item) => {
            const li = document.createElement("li");

            li.innerHTML = `
                <b>${item.name}</b> - ₹${item.price}
                <br>
                ${item.image ? `<img src="${item.image}" width="80"><br>` : ""}
                <button onclick="deleteProduct('${item._id}')">Delete</button>
                <button onclick="editProduct('${item._id}', '${item.name}', '${item.price}', '${item.image || ""}')">Edit</button>
            `;

            list.appendChild(li);
        });
    } catch (err) {
        console.error("Load products error:", err);
        list.innerHTML = "<li style='color:red;'>Failed to load products</li>";
    }
}

function logout() {
    localStorage.removeItem("admin");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
