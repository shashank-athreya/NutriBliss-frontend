<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.12);
            text-align: center;
        }

        h2 {
            color: #1b5e20;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff7f00;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .error {
            color: red;
            margin-top: 10px;
            font-weight: bold;
        }

        .home {
            display: block;
            margin-top: 12px;
            text-decoration: none;
            color: #1b5e20;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="login-btn" onclick="login()">Login</button>

    <p id="error" class="error"></p>

    <a class="home" href="index.html">← Back to Website</a>
</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";

async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("login-btn");

    errorEl.innerText = "";

    if (!username || !password) {
        errorEl.innerText = "Please enter username and password";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Logging in...";

    try {
        const res = await fetch(`${API_URL}/admin-login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
            errorEl.innerText = "Invalid credentials";
            btn.disabled = false;
            btn.innerText = "Login";
            return;
        }

        localStorage.setItem("adminToken", data.token);

        window.location.href = "admin.html";

    } catch (err) {
        errorEl.innerText = "Server error. Try again.";
        btn.disabled = false;
        btn.innerText = "Login";
    }
}
</script>

</body>
</html>
