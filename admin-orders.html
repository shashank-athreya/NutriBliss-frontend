<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #fffaf2;
            color: #333;
        }

        .navbar {
            background: #2e7d32;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a, .navbar button {
            color: white;
            background: #ff7f00;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 25px;
        }

        h2 {
            color: #2e7d32;
        }

        .order-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .order-card p {
            margin: 7px 0;
        }

        .items {
            background: #fffaf2;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }

        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        .update-btn {
            padding: 8px 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
        }

        @media(max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .navbar a, .navbar button {
                margin: 4px;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>NutriBliss Orders</h2>
    <div>
        <a href="admin.html">Dashboard</a>
        <a href="index.html">View Site</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>All Orders</h2>
    <div id="orders-list">Loading orders...</div>
</div>

<script>
    const BASE_URL = "https://nutribliss-backend-4.onrender.com";
    
    const token = localStorage.getItem("adminToken");
    
    window.onload = loadOrders;
    
    // ================= LOAD ORDERS =================
    async function loadOrders() {
        const ordersList = document.getElementById("orders-list");
        ordersList.innerHTML = "Loading orders...";
    
        try {
            const res = await fetch(`${BASE_URL}/orders`, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
    
            if (!res.ok) throw new Error();
    
            const orders = await res.json();
    
            ordersList.innerHTML = "";
    
            if (!orders || orders.length === 0) {
                ordersList.innerHTML = `<p class="empty">No orders found</p>`;
                return;
            }
    
            orders.forEach(order => {
                let itemsHtml = "";
    
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        itemsHtml += `
                            <p>
                                <strong>${item.name}</strong> -
                                ₹${item.price} × ${item.quantity}
                            </p>
                        `;
                    });
                } else {
                    itemsHtml = "<p>No items found</p>";
                }
    
                const div = document.createElement("div");
                div.className = "order-card";
    
                div.innerHTML = `
                    <p><strong>Customer:</strong> ${order.name}</p>
                    <p><strong>Phone:</strong> ${order.phone}</p>
                    <p><strong>Address:</strong> ${order.address}</p>
                    <p><strong>Total:</strong> ₹${order.total}</p>
                    <p><strong>Payment ID:</strong> ${order.paymentId || "N/A"}</p>
                    <p><strong>Date:</strong> ${new Date(order.date).toLocaleString()}</p>
                    <p><strong>Status:</strong> ${order.status}</p>
    
                    <div class="items">
                        <strong>Items:</strong>
                        ${itemsHtml}
                    </div>
    
                    <select id="status-${order._id}">
                        <option value="Pending" ${order.status === "Pending" ? "selected" : ""}>Pending</option>
                        <option value="Processing" ${order.status === "Processing" ? "selected" : ""}>Processing</option>
                        <option value="Shipped" ${order.status === "Shipped" ? "selected" : ""}>Shipped</option>
                        <option value="Delivered" ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
                        <option value="Cancelled" ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
                    </select>
    
                    <button class="update-btn" onclick="updateStatus('${order._id}')">
                        Update Status
                    </button>
                `;
    
                ordersList.appendChild(div);
            });
    
        } catch (err) {
            console.error("Orders error:", err);
            ordersList.innerHTML = `<p style="color:red;">Failed to load orders</p>`;
        }
    }
    
    // ================= UPDATE STATUS =================
    async function updateStatus(orderId) {
        const status = document.getElementById(`status-${orderId}`).value;
    
        try {
            const res = await fetch(`${BASE_URL}/orders/${orderId}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ status })
            });
    
            if (!res.ok) throw new Error();
    
            alert("Order status updated ✅");
            loadOrders();
    
        } catch (err) {
            alert("Failed to update order status ❌");
        }
    }
    
    // ================= LOGOUT =================
    function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "admin-login.html";
    }
    </script>

</body>
</html>
