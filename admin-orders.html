<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #fffaf2;
            color: #333;
        }

        .navbar {
            background: #2e7d32;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a, .navbar button {
            color: white;
            background: #ff7f00;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 25px;
        }

        h2 { color: #2e7d32; }

        .filter-box {
            background: white;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 9px 13px;
            margin: 5px;
            border: none;
            border-radius: 20px;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
        }

        .filter-btn.active {
            background: #2e7d32;
            color: white;
        }

        .order-count {
            margin-top: 10px;
            color: #555;
            font-weight: bold;
        }

        .order-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .order-card p { margin: 7px 0; }

        .items {
            background: #fffaf2;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .status-badge,
        .payment-badge {
            padding: 5px 10px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            display: inline-block;
        }

        .status-pending { background: #fbc02d; color: #333; }
        .status-processing { background: #1976d2; }
        .status-shipped { background: #7b1fa2; }
        .status-delivered { background: #2e7d32; }
        .status-cancelled { background: #d32f2f; }

        .payment-cod {
            background: #6d4c41;
        }

        .payment-online {
            background: #1565c0;
        }

        select {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        .update-btn {
            padding: 8px 12px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-left: 8px;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
        }

        @media(max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .navbar a, .navbar button {
                margin: 4px;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>NutriBliss Orders</h2>
    <div>
        <a href="admin.html">Dashboard</a>
        <a href="index.html">View Site</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">
    <h2>All Orders</h2>

    <div class="filter-box">
        <button class="filter-btn active" onclick="filterOrders('All', this)">All</button>
        <button class="filter-btn" onclick="filterOrders('Pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterOrders('Processing', this)">Processing</button>
        <button class="filter-btn" onclick="filterOrders('Shipped', this)">Shipped</button>
        <button class="filter-btn" onclick="filterOrders('Delivered', this)">Delivered</button>
        <button class="filter-btn" onclick="filterOrders('Cancelled', this)">Cancelled</button>

        <div class="order-count" id="order-count">Orders: 0</div>
    </div>

    <div id="orders-list">Loading orders...</div>
</div>

<script>
const BASE_URL = "https://nutribliss-backend-4.onrender.com";
const token = localStorage.getItem("adminToken");

let allOrders = [];
let currentFilter = "All";

window.onload = loadOrders;

function handleAuthError(res) {
    if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("adminToken");
        alert("Session expired. Please login again.");
        window.location.href = "admin-login.html";
        return true;
    }
    return false;
}

function getStatusClass(status) {
    if (status === "Pending") return "status-pending";
    if (status === "Processing") return "status-processing";
    if (status === "Shipped") return "status-shipped";
    if (status === "Delivered") return "status-delivered";
    if (status === "Cancelled") return "status-cancelled";
    return "status-pending";
}

function isCOD(order) {
    return order.paymentId === "COD";
}

async function loadOrders() {
    const ordersList = document.getElementById("orders-list");
    ordersList.innerHTML = "Loading orders...";

    try {
        const res = await fetch(`${BASE_URL}/orders`, {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        if (handleAuthError(res)) return;

        if (!res.ok) throw new Error("Failed to fetch orders");

        allOrders = await res.json();
        renderOrders();

    } catch (err) {
        ordersList.innerHTML = `<p style="color:red;">Failed to load orders</p>`;
    }
}

function filterOrders(status, button) {
    currentFilter = status;

    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    button.classList.add("active");
    renderOrders();
}

function renderOrders() {
    const ordersList = document.getElementById("orders-list");

    let orders = allOrders;

    if (currentFilter !== "All") {
        orders = allOrders.filter(order => order.status === currentFilter);
    }

    document.getElementById("order-count").innerText = "Orders: " + orders.length;

    ordersList.innerHTML = "";

    if (!orders || orders.length === 0) {
        ordersList.innerHTML = `<p class="empty">No orders found</p>`;
        return;
    }

    orders.forEach(order => {
        let itemsHtml = "";

        if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
                itemsHtml += `
                    <p>
                        <strong>${item.name}</strong> -
                        ₹${item.price} × ${item.quantity}
                    </p>
                `;
            });
        } else {
            itemsHtml = "<p>No items found</p>";
        }

        const paymentMethod = isCOD(order) ? "Cash on Delivery" : "Online Payment";
        const paymentClass = isCOD(order) ? "payment-cod" : "payment-online";

        const div = document.createElement("div");
        div.className = "order-card";

        div.innerHTML = `
            <p><strong>Customer:</strong> ${order.name}</p>
            <p><strong>Phone:</strong> ${order.phone}</p>
            <p><strong>Address:</strong> ${order.address}</p>
            <p><strong>Total:</strong> ₹${order.total}</p>

            <p>
                <strong>Payment Method:</strong>
                <span class="payment-badge ${paymentClass}">
                    ${paymentMethod}
                </span>
            </p>

            ${!isCOD(order) ? `<p><strong>Payment ID:</strong> ${order.paymentId || "N/A"}</p>` : ""}

            <p><strong>Date:</strong> ${new Date(order.date).toLocaleString()}</p>
            <p>
                <strong>Status:</strong>
                <span class="status-badge ${getStatusClass(order.status)}">
                    ${order.status}
                </span>
            </p>

            <div class="items">
                <strong>Items:</strong>
                ${itemsHtml}
            </div>

            <select id="status-${order._id}">
                <option value="Pending" ${order.status === "Pending" ? "selected" : ""}>Pending</option>
                <option value="Processing" ${order.status === "Processing" ? "selected" : ""}>Processing</option>
                <option value="Shipped" ${order.status === "Shipped" ? "selected" : ""}>Shipped</option>
                <option value="Delivered" ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
                <option value="Cancelled" ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
            </select>

            <button class="update-btn" onclick="updateStatus('${order._id}')">
                Update Status
            </button>
        `;

        ordersList.appendChild(div);
    });
}

async function updateStatus(orderId) {
    const status = document.getElementById(`status-${orderId}`).value;

    try {
        const res = await fetch(`${BASE_URL}/orders/${orderId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ status })
        });

        if (handleAuthError(res)) return;

        if (!res.ok) throw new Error("Failed to update status");

        alert("Order status updated ✅");
        loadOrders();

    } catch (err) {
        alert("Failed to update order status ❌");
    }
}

function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
