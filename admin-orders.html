<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            color: #333;
        }

        .navbar {
            background: #1b5e20;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .navbar a, .navbar button {
            color: white;
            background: #ff7f00;
            border: none;
            padding: 10px 14px;
            border-radius: 25px;
            text-decoration: none;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1150px;
            margin: auto;
            padding: 28px;
        }

        .header-box, .filter-box, .order-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
        }

        .header-box {
            padding: 25px;
            margin-bottom: 22px;
        }

        .header-box h1 {
            color: #1b5e20;
            margin-bottom: 8px;
        }

        .filter-box {
            padding: 18px;
            margin-bottom: 22px;
        }

        .filter-btn {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 25px;
            background: #eee;
            cursor: pointer;
            font-weight: bold;
        }

        .filter-btn.active {
            background: #1b5e20;
            color: white;
        }

        .order-count {
            margin-top: 12px;
            color: #555;
            font-weight: bold;
        }

        .order-card {
            padding: 22px;
            margin-bottom: 22px;
            border-left: 7px solid #1b5e20;
        }

        .order-top {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .customer-name {
            font-size: 21px;
            font-weight: bold;
            color: #1b5e20;
        }

        .amount {
            font-size: 24px;
            font-weight: bold;
            color: #ff7f00;
        }

        .order-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 12px;
            margin-top: 15px;
        }

        .info-box {
            background: #fffaf2;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #f1e5d0;
        }

        .info-box strong {
            color: #1b5e20;
        }

        .status-badge,
        .payment-badge {
            padding: 6px 11px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            display: inline-block;
            font-size: 13px;
        }

        .status-pending { background: #fbc02d; color: #333; }
        .status-processing { background: #1976d2; }
        .status-shipped { background: #7b1fa2; }
        .status-delivered { background: #2e7d32; }
        .status-cancelled { background: #d32f2f; }

        .payment-cod { background: #6d4c41; }
        .payment-online { background: #1565c0; }

        .items {
            background: #fffaf2;
            padding: 15px;
            border-radius: 14px;
            margin-top: 15px;
            border: 1px solid #f1e5d0;
        }

        .item-row {
            padding: 8px 0;
            border-bottom: 1px solid #eadfce;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        select {
            padding: 11px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .update-btn {
            padding: 11px 16px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 18px;
        }

        @media(max-width: 650px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .navbar a, .navbar button {
                margin: 4px;
            }

            .amount {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>NutriBliss Orders</h2>
    <div>
        <a href="admin.html">Dashboard</a>
        <a href="index.html">View Site</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <div class="header-box">
        <h1>Orders Dashboard</h1>
        <p>Manage customer orders, payment methods and delivery status.</p>
    </div>

    <div class="filter-box">
        <button class="filter-btn active" onclick="filterOrders('All', this)">All</button>
        <button class="filter-btn" onclick="filterOrders('Pending', this)">Pending</button>
        <button class="filter-btn" onclick="filterOrders('Processing', this)">Processing</button>
        <button class="filter-btn" onclick="filterOrders('Shipped', this)">Shipped</button>
        <button class="filter-btn" onclick="filterOrders('Delivered', this)">Delivered</button>
        <button class="filter-btn" onclick="filterOrders('Cancelled', this)">Cancelled</button>

        <div class="order-count" id="order-count">Orders: 0</div>
    </div>

    <div id="orders-list">Loading orders...</div>
</div>

<script>
const BASE_URL = "https://nutribliss-backend-4.onrender.com";
const token = localStorage.getItem("adminToken");

let allOrders = [];
let currentFilter = "All";

window.onload = loadOrders;

function handleAuthError(res) {
    if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("adminToken");
        alert("Session expired. Please login again.");
        window.location.href = "admin-login.html";
        return true;
    }
    return false;
}

function getStatusClass(status) {
    if (status === "Pending") return "status-pending";
    if (status === "Processing") return "status-processing";
    if (status === "Shipped") return "status-shipped";
    if (status === "Delivered") return "status-delivered";
    if (status === "Cancelled") return "status-cancelled";
    return "status-pending";
}

function isCOD(order) {
    return order.paymentId === "COD";
}

async function loadOrders() {
    const ordersList = document.getElementById("orders-list");
    ordersList.innerHTML = "Loading orders...";

    try {
        const res = await fetch(`${BASE_URL}/orders`, {
            headers: { Authorization: `Bearer ${token}` }
        });

        if (handleAuthError(res)) return;
        if (!res.ok) throw new Error("Failed to fetch orders");

        allOrders = await res.json();
        renderOrders();

    } catch (err) {
        ordersList.innerHTML = `<p class="empty" style="color:red;">Failed to load orders</p>`;
    }
}

function filterOrders(status, button) {
    currentFilter = status;

    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
    });

    button.classList.add("active");
    renderOrders();
}

function renderOrders() {
    const ordersList = document.getElementById("orders-list");

    let orders = allOrders;

    if (currentFilter !== "All") {
        orders = allOrders.filter(order => order.status === currentFilter);
    }

    document.getElementById("order-count").innerText = "Orders: " + orders.length;

    ordersList.innerHTML = "";

    if (!orders || orders.length === 0) {
        ordersList.innerHTML = `<p class="empty">No orders found</p>`;
        return;
    }

    orders.forEach(order => {
        let itemsHtml = "";

        if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
                itemsHtml += `
                    <div class="item-row">
                        <strong>${item.name}</strong><br>
                        ₹${item.price} × ${item.quantity}
                    </div>
                `;
            });
        } else {
            itemsHtml = "<p>No items found</p>";
        }

        const paymentMethod = isCOD(order) ? "Cash on Delivery" : "Online Payment";
        const paymentClass = isCOD(order) ? "payment-cod" : "payment-online";

        const div = document.createElement("div");
        div.className = "order-card";

        div.innerHTML = `
            <div class="order-top">
                <div>
                    <div class="customer-name">${order.name}</div>
                    <p>${order.phone}</p>
                </div>

                <div class="amount">₹${order.total}</div>
            </div>

            <div class="order-grid">
                <div class="info-box">
                    <strong>Address</strong>
                    <p>${order.address}</p>
                </div>

                <div class="info-box">
                    <strong>Payment</strong><br><br>
                    <span class="payment-badge ${paymentClass}">
                        ${paymentMethod}
                    </span>
                    ${!isCOD(order) ? `<p><strong>ID:</strong> ${order.paymentId || "N/A"}</p>` : ""}
                </div>

                <div class="info-box">
                    <strong>Status</strong><br><br>
                    <span class="status-badge ${getStatusClass(order.status)}">
                        ${order.status}
                    </span>
                </div>

                <div class="info-box">
                    <strong>Date</strong>
                    <p>${new Date(order.date).toLocaleString()}</p>
                </div>
            </div>

            <div class="items">
                <strong>Items Ordered:</strong>
                ${itemsHtml}
            </div>

            <div class="actions">
                <select id="status-${order._id}">
                    <option value="Pending" ${order.status === "Pending" ? "selected" : ""}>Pending</option>
                    <option value="Processing" ${order.status === "Processing" ? "selected" : ""}>Processing</option>
                    <option value="Shipped" ${order.status === "Shipped" ? "selected" : ""}>Shipped</option>
                    <option value="Delivered" ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
                    <option value="Cancelled" ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
                </select>

                <button class="update-btn" onclick="updateStatus('${order._id}')">
                    Update Status
                </button>
            </div>
        `;

        ordersList.appendChild(div);
    });
}

async function updateStatus(orderId) {
    const status = document.getElementById(`status-${orderId}`).value;

    try {
        const res = await fetch(`${BASE_URL}/orders/${orderId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ status })
        });

        if (handleAuthError(res)) return;
        if (!res.ok) throw new Error("Failed to update status");

        alert("Order status updated ✅");
        loadOrders();

    } catch (err) {
        alert("Failed to update order status ❌");
    }
}

function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
