<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #fffaf2;
        }

        .navbar {
            background: #1b5e20;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a, .navbar button {
            background: #ff7f00;
            color: white;
            padding: 8px 12px;
            border: none;
            margin-left: 5px;
            border-radius: 6px;
            cursor: pointer;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }

        input, select {
            padding: 10px;
            margin: 5px;
            width: 180px;
        }

        button {
            padding: 10px;
            background: #1b5e20;
            color: white;
            border: none;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #fffaf2;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .stock-low {
            color: red;
            font-weight: bold;
        }

        .stock-ok {
            color: green;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>NutriBliss Admin</h2>
    <div>
        <a href="admin-orders.html">Orders</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <!-- STATS -->
    <div class="box">
        <h3>Analytics</h3>
        <p>Total Revenue: ₹<span id="revenue">0</span></p>
        <p>Total Orders: <span id="orders">0</span></p>
        <p>Pending Orders: <span id="pending">0</span></p>
    </div>

    <!-- ADD PRODUCT -->
    <div class="box">
        <h3>Add Product</h3>

        <input id="name" placeholder="Name">
        <input id="price" placeholder="Price">
        <input id="image" placeholder="Image URL">
        <input id="stock" placeholder="Stock">

        <select id="category">
            <option>Mixed</option>
            <option>Cashew</option>
            <option>Almond</option>
            <option>Pistachio</option>
            <option>Walnut</option>
        </select>

        <button onclick="addProduct()">Add</button>
    </div>

    <!-- FILTER -->
    <div class="box">
        <h3>Filter</h3>

        <input id="search" placeholder="Search" oninput="filterProducts()">

        <select id="categoryFilter" onchange="filterProducts()">
            <option value="All">All</option>
            <option>Cashew</option>
            <option>Almond</option>
            <option>Pistachio</option>
            <option>Walnut</option>
            <option>Mixed</option>
        </select>
    </div>

    <!-- PRODUCTS -->
    <div class="box">
        <h3>Products</h3>
        <ul id="list"></ul>
    </div>

</div>

<script>
const API = "https://nutribliss-backend-4.onrender.com";
const token = localStorage.getItem("adminToken");

let allProducts = [];

window.onload = () => {
    loadProducts();
    loadAnalytics();
};

function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}

// ================= PRODUCTS =================
async function loadProducts() {
    const res = await fetch(`${API}/products`);
    const data = await res.json();

    allProducts = data;
    render(data);
}

function render(data) {
    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(p => {
        const li = document.createElement("li");

        const stockClass = p.stock <= 5 ? "stock-low" : "stock-ok";

        li.innerHTML = `
            <div>
                <b>${p.name}</b> - ₹${p.price}
                <br>
                <small>${p.category}</small>
                <br>
                <span class="${stockClass}">Stock: ${p.stock}</span>
            </div>

            <div>
                <button onclick="edit('${p._id}', '${p.name}', '${p.price}', '${p.image}', '${p.category}', '${p.stock}')">Edit</button>
                <button onclick="del('${p._id}')">Delete</button>
            </div>
        `;

        list.appendChild(li);
    });
}

// ================= ADD =================
async function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;
    const category = document.getElementById("category").value;
    const stock = document.getElementById("stock").value;

    await fetch(`${API}/products`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name, price, image, category, stock })
    });

    loadProducts();
}

// ================= DELETE =================
async function del(id) {
    await fetch(`${API}/products/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` }
    });

    loadProducts();
}

// ================= EDIT =================
async function edit(id, name, price, image, category, stock) {
    const newName = prompt("Name", name);
    const newPrice = prompt("Price", price);
    const newStock = prompt("Stock", stock);

    await fetch(`${API}/products/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            name: newName,
            price: newPrice,
            image,
            category,
            stock: newStock
        })
    });

    loadProducts();
}

// ================= FILTER =================
function filterProducts() {
    const search = document.getElementById("search").value.toLowerCase();
    const cat = document.getElementById("categoryFilter").value;

    const filtered = allProducts.filter(p => {
        const nameMatch = p.name.toLowerCase().includes(search);
        const catMatch = cat === "All" || p.category === cat;
        return nameMatch && catMatch;
    });

    render(filtered);
}

// ================= ANALYTICS =================
async function loadAnalytics() {
    const res = await fetch(`${API}/orders`, {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();

    let revenue = 0, pending = 0;

    data.forEach(o => {
        revenue += Number(o.total);
        if (o.status === "Pending") pending++;
    });

    document.getElementById("revenue").innerText = revenue;
    document.getElementById("orders").innerText = data.length;
    document.getElementById("pending").innerText = pending;
}
</script>

</body>
</html>
