<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="
        default-src * 'self' data: blob:;
        connect-src *;
        script-src * 'unsafe-inline' 'unsafe-eval';
        style-src * 'unsafe-inline';
        img-src * data:;
    ">

    <title>Admin Panel - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            color: #333;
        }

        .navbar {
            background: #1b5e20;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        .navbar h2 span {
            color: #ffb74d;
        }

        .navbar a, .navbar button {
            color: white;
            background: #ff7f00;
            border: none;
            padding: 10px 14px;
            border-radius: 25px;
            text-decoration: none;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1150px;
            margin: auto;
            padding: 28px;
        }

        .welcome {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .welcome h1 {
            color: #1b5e20;
            margin-bottom: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
            border-left: 7px solid #1b5e20;
        }

        .stat-card h3 {
            margin-bottom: 10px;
            color: #555;
            font-size: 16px;
        }

        .stat-card p {
            font-size: 28px;
            font-weight: bold;
            color: #ff7f00;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .box h2 {
            color: #1b5e20;
            margin-bottom: 15px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        input {
            padding: 13px;
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 10px;
        }

        .add-btn {
            margin-top: 14px;
            padding: 13px 18px;
            background: #1b5e20;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { padding: 0; }

        li {
            background: #fffaf2;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 16px;
            list-style: none;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #f1e5d0;
        }

        .product-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .product-info img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            background: white;
            border-radius: 14px;
            padding: 6px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
        }

        .product-price {
            color: #ff7f00;
            font-weight: bold;
            margin-top: 4px;
        }

        .actions button {
            margin: 4px;
            padding: 9px 13px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        .edit-btn { background: #ff7f00; }
        .delete-btn { background: #d32f2f; }

        @media(max-width: 650px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            li {
                align-items: flex-start;
            }

            .product-info {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>Nutri<span>Bliss</span> Admin</h2>
    <div>
        <a href="admin-orders.html">Orders</a>
        <a href="index.html">View Site</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <div class="welcome">
        <h1>Dashboard</h1>
        <p>Manage your products, orders and NutriBliss business performance.</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Revenue</h3>
            <p id="total-revenue">₹0</p>
        </div>

        <div class="stat-card">
            <h3>Total Orders</h3>
            <p id="total-orders">0</p>
        </div>

        <div class="stat-card">
            <h3>Pending Orders</h3>
            <p id="pending-orders">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Products</h3>
            <p id="total-products">0</p>
        </div>
    </div>

    <div class="box">
        <h2>Add New Product</h2>

        <div class="form-grid">
            <input id="name" placeholder="Product Name">
            <input id="price" placeholder="Price">
            <input id="image" placeholder="Image URL">
        </div>

        <button class="add-btn" onclick="addProduct()">+ Add Product</button>
    </div>

    <div class="box">
        <h2>Product Inventory</h2>
        <ul id="admin-products"></ul>
    </div>

</div>

<script>
const BASE_URL = "https://nutribliss-backend-4.onrender.com";
const token = localStorage.getItem("adminToken");

window.onload = function () {
    loadProducts();
    loadAnalytics();
};

function handleAuthError(res) {
    if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("adminToken");
        alert("Session expired. Please login again.");
        window.location.href = "admin-login.html";
        return true;
    }
    return false;
}

async function loadAnalytics() {
    try {
        const res = await fetch(`${BASE_URL}/orders`, {
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        if (handleAuthError(res)) return;

        const orders = await res.json();

        let totalRevenue = 0;
        let pendingOrders = 0;

        orders.forEach(order => {
            totalRevenue += Number(order.total) || 0;

            if (order.status === "Pending") {
                pendingOrders++;
            }
        });

        document.getElementById("total-revenue").innerText = "₹" + totalRevenue;
        document.getElementById("total-orders").innerText = orders.length;
        document.getElementById("pending-orders").innerText = pendingOrders;

    } catch (err) {
        console.error("Analytics error:", err);
    }
}

async function addProduct() {
    const name = document.getElementById("name").value.trim();
    const price = document.getElementById("price").value.trim();
    const image = document.getElementById("image").value.trim();

    if (!name || !price) {
        alert("Name and price are required");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/products`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ name, price, image })
        });

        if (handleAuthError(res)) return;

        if (!res.ok) throw new Error("Failed to add product");

        alert("Product added successfully 🚀");

        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("image").value = "";

        loadProducts();
    } catch (err) {
        alert("Error adding product ❌");
    }
}

async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    try {
        const res = await fetch(`${BASE_URL}/products/${id}`, {
            method: "DELETE",
            headers: {
                Authorization: `Bearer ${token}`
            }
        });

        if (handleAuthError(res)) return;

        loadProducts();
    } catch (err) {
        alert("Delete failed ❌");
    }
}

async function editProduct(id, name, price, image) {
    const newName = prompt("New name:", name);
    const newPrice = prompt("New price:", price);
    const newImage = prompt("New image URL:", image);

    if (!newName || !newPrice) return;

    try {
        const res = await fetch(`${BASE_URL}/products/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({
                name: newName,
                price: newPrice,
                image: newImage
            })
        });

        if (handleAuthError(res)) return;

        loadProducts();
    } catch (err) {
        alert("Edit failed ❌");
    }
}

async function loadProducts() {
    const list = document.getElementById("admin-products");
    list.innerHTML = "Loading...";

    try {
        const res = await fetch(`${BASE_URL}/products`);

        if (!res.ok) throw new Error("Failed to fetch products");

        const data = await res.json();

        document.getElementById("total-products").innerText = data.length;

        list.innerHTML = "";

        if (!data || data.length === 0) {
            list.innerHTML = "<li>No products found</li>";
            return;
        }

        data.forEach((item) => {
            const li = document.createElement("li");

            li.innerHTML = `
                <div class="product-info">
                    ${item.image ? `<img src="${item.image}">` : ""}
                    <div>
                        <div class="product-name">${item.name}</div>
                        <div class="product-price">₹${item.price}/kg</div>
                    </div>
                </div>

                <div class="actions">
                    <button class="edit-btn" onclick="editProduct('${item._id}', '${item.name}', '${item.price}', '${item.image || ""}')">Edit</button>
                    <button class="delete-btn" onclick="deleteProduct('${item._id}')">Delete</button>
                </div>
            `;

            list.appendChild(li);
        });
    } catch (err) {
        list.innerHTML = "<li style='color:red;'>Failed to load products</li>";
    }
}

function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}
</script>

</body>
</html>
