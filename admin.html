<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy" content="
        default-src * 'self' data: blob:;
        connect-src *;
        script-src * 'unsafe-inline' 'unsafe-eval';
        style-src * 'unsafe-inline';
        img-src * data:;
    ">

    <title>Admin Panel - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #fffaf2;
            color: #333;
        }

        .navbar {
            background: #2e7d32;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a, .navbar button {
            color: white;
            background: #ff7f00;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            margin-left: 8px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 25px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            border-left: 6px solid #2e7d32;
        }

        .stat-card h3 {
            margin-bottom: 10px;
            color: #555;
        }

        .stat-card p {
            font-size: 26px;
            font-weight: bold;
            color: #ff7f00;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        input {
            display: block;
            margin: 12px 0;
            padding: 12px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .add-btn {
            padding: 12px 18px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        ul {
            padding: 0;
        }

        li {
            background: #fffaf2;
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 12px;
            list-style: none;
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .product-info {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .product-info img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: white;
            border-radius: 10px;
        }

        .actions button {
            margin: 4px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        .edit-btn {
            background: #ff7f00;
        }

        .delete-btn {
            background: #d32f2f;
        }

        @media(max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            li {
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>

<div class="navbar">
    <h2>NutriBliss Admin</h2>
    <div>
        <a href="admin-orders.html">Orders</a>
        <a href="index.html">View Site</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <div class="stats">
        <div class="stat-card">
            <h3>Total Revenue</h3>
            <p id="total-revenue">₹0</p>
        </div>

        <div class="stat-card">
            <h3>Total Orders</h3>
            <p id="total-orders">0</p>
        </div>

        <div class="stat-card">
            <h3>Pending Orders</h3>
            <p id="pending-orders">0</p>
        </div>

        <div class="stat-card">
            <h3>Total Products</h3>
            <p id="total-products">0</p>
        </div>
    </div>

    <div class="box">
        <h2>Add Product</h2>

        <input id="name" placeholder="Product Name">
        <input id="price" placeholder="Price">
        <input id="image" placeholder="Image URL">

        <button class="add-btn" onclick="addProduct()">Add Product</button>
    </div>

    <div class="box">
        <h2>All Products</h2>
        <ul id="admin-products"></ul>
    </div>

</div>

<script>
    const BASE_URL = "https://nutribliss-backend-4.onrender.com";
    
    const token = localStorage.getItem("adminToken");
    
    window.onload = function () {
        loadProducts();
        loadAnalytics();
    };
    
    // ================= ANALYTICS =================
    async function loadAnalytics() {
        try {
            const res = await fetch(`${BASE_URL}/orders`, {
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
    
            const orders = await res.json();
    
            let totalRevenue = 0;
            let pendingOrders = 0;
    
            orders.forEach(order => {
                totalRevenue += Number(order.total) || 0;
    
                if (order.status === "Pending") {
                    pendingOrders++;
                }
            });
    
            document.getElementById("total-revenue").innerText = "₹" + totalRevenue;
            document.getElementById("total-orders").innerText = orders.length;
            document.getElementById("pending-orders").innerText = pendingOrders;
    
        } catch (err) {
            console.error("Analytics error:", err);
        }
    }
    
    // ================= ADD PRODUCT =================
    async function addProduct() {
        const name = document.getElementById("name").value.trim();
        const price = document.getElementById("price").value.trim();
        const image = document.getElementById("image").value.trim();
    
        if (!name || !price) {
            alert("Name and price are required");
            return;
        }
    
        try {
            const res = await fetch(`${BASE_URL}/products`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({ name, price, image })
            });
    
            if (!res.ok) throw new Error();
    
            alert("Product added successfully 🚀");
    
            document.getElementById("name").value = "";
            document.getElementById("price").value = "";
            document.getElementById("image").value = "";
    
            loadProducts();
        } catch {
            alert("Error adding product ❌");
        }
    }
    
    // ================= DELETE =================
    async function deleteProduct(id) {
        if (!confirm("Delete this product?")) return;
    
        try {
            await fetch(`${BASE_URL}/products/${id}`, {
                method: "DELETE",
                headers: {
                    Authorization: `Bearer ${token}`
                }
            });
    
            loadProducts();
        } catch (err) {
            console.error(err);
        }
    }
    
    // ================= EDIT =================
    async function editProduct(id, name, price, image) {
        const newName = prompt("New name:", name);
        const newPrice = prompt("New price:", price);
        const newImage = prompt("New image URL:", image);
    
        if (!newName || !newPrice) return;
    
        try {
            await fetch(`${BASE_URL}/products/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    Authorization: `Bearer ${token}`
                },
                body: JSON.stringify({
                    name: newName,
                    price: newPrice,
                    image: newImage
                })
            });
    
            loadProducts();
        } catch (err) {
            console.error(err);
        }
    }
    
    // ================= LOAD PRODUCTS =================
    async function loadProducts() {
        const list = document.getElementById("admin-products");
        list.innerHTML = "Loading...";
    
        try {
            const res = await fetch(`${BASE_URL}/products`);
    
            const data = await res.json();
    
            document.getElementById("total-products").innerText = data.length;
    
            list.innerHTML = "";
    
            data.forEach((item) => {
                const li = document.createElement("li");
    
                li.innerHTML = `
                    <div class="product-info">
                        ${item.image ? `<img src="${item.image}">` : ""}
                        <div>
                            <strong>${item.name}</strong><br>
                            ₹${item.price}
                        </div>
                    </div>
    
                    <div class="actions">
                        <button class="edit-btn" onclick="editProduct('${item._id}', '${item.name}', '${item.price}', '${item.image || ""}')">Edit</button>
                        <button class="delete-btn" onclick="deleteProduct('${item._id}')">Delete</button>
                    </div>
                `;
    
                list.appendChild(li);
            });
    
        } catch {
            list.innerHTML = "<li style='color:red;'>Failed to load products</li>";
        }
    }
    
    // ================= LOGOUT =================
    function logout() {
        localStorage.removeItem("adminToken");
        window.location.href = "admin-login.html";
    }
    </script>
