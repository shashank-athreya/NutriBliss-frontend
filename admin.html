<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        if (!localStorage.getItem("adminToken")) {
            window.location.href = "admin-login.html";
        }
    </script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #fffaf2;
        }

        .navbar {
            background: #1b5e20;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a, .navbar button {
            background: #ff7f00;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            margin-left: 5px;
            cursor: pointer;
        }

        .container {
            padding: 20px;
        }

        input, select {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
        }

        .card {
            background: white;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
        }

        .low-stock {
            color: orange;
            font-weight: bold;
        }

        .out-stock {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h3>NutriBliss Admin</h3>
    <div>
        <a href="admin-orders.html">Orders</a>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <h2>Add Product</h2>

    <input id="name" placeholder="Product Name">
    <input id="price" placeholder="Price">
    <input id="image" placeholder="Image URL">

    <select id="category">
        <option>Mixed</option>
        <option>Cashew</option>
        <option>Almond</option>
        <option>Pistachio</option>
        <option>Walnut</option>
    </select>

    <input id="stock" placeholder="Stock Quantity">

    <button onclick="addProduct()">Add Product</button>

    <h2>Products</h2>
    <div id="products"></div>

</div>

<script>
const BASE_URL = "https://nutribliss-backend-4.onrender.com";
const token = localStorage.getItem("adminToken");

async function loadProducts() {
    const res = await fetch(`${BASE_URL}/products`);
    const data = await res.json();

    const container = document.getElementById("products");
    container.innerHTML = "";

    data.forEach(p => {
        let stockText = `Stock: ${p.stock}`;

        if (p.stock <= 0) {
            stockText = `<span class="out-stock">Out of Stock</span>`;
        } else if (p.stock <= 5) {
            stockText = `<span class="low-stock">Low Stock (${p.stock})</span>`;
        }

        container.innerHTML += `
            <div class="card">
                <h3>${p.name}</h3>
                <p>₹${p.price}</p>
                <p>${p.category}</p>
                <p>${stockText}</p>

                <button onclick="editProduct('${p._id}', '${p.name}', '${p.price}', '${p.image}', '${p.category}', '${p.stock}')">Edit</button>
                <button onclick="deleteProduct('${p._id}')">Delete</button>
            </div>
        `;
    });
}

async function addProduct() {
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const image = document.getElementById("image").value;
    const category = document.getElementById("category").value;
    const stock = document.getElementById("stock").value;

    await fetch(`${BASE_URL}/products`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ name, price, image, category, stock })
    });

    alert("Added ✅");
    loadProducts();
}

async function deleteProduct(id) {
    await fetch(`${BASE_URL}/products/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` }
    });

    loadProducts();
}

async function editProduct(id, name, price, image, category, stock) {
    const newName = prompt("Name:", name);
    const newPrice = prompt("Price:", price);
    const newStock = prompt("Stock:", stock);

    await fetch(`${BASE_URL}/products/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({
            name: newName,
            price: newPrice,
            image,
            category,
            stock: newStock
        })
    });

    loadProducts();
}

function logout() {
    localStorage.removeItem("adminToken");
    window.location.href = "admin-login.html";
}

loadProducts();
</script>

</body>
</html>
