<!DOCTYPE html>
<html>
<head>
    <title>Cart - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            margin: 0;
            padding: 18px;
            color: #333;
        }

        h2 {
            text-align: center;
            color: #1b5e20;
            margin-bottom: 20px;
        }

        .cart-container {
            max-width: 850px;
            margin: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 15px;
            align-items: center;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        }

        .cart-item img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            background: #fff8ed;
            border-radius: 14px;
            padding: 6px;
            flex-shrink: 0;
        }

        .cart-details {
            flex: 1;
        }

        .cart-details h3 {
            margin: 0 0 6px;
            color: #1b5e20;
        }

        .price {
            color: #ff7f00;
            font-weight: bold;
            margin: 5px 0;
        }

        .stock {
            font-size: 13px;
            color: #555;
            margin: 5px 0;
        }

        .qty-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .qty-controls button {
            width: 34px;
            height: 34px;
            border: none;
            background: #2e7d32;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        .qty-controls span {
            min-width: 28px;
            text-align: center;
            font-weight: bold;
        }

        .qty-controls button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .remove-btn {
            background: #d32f2f;
            padding: 9px 12px;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .summary-box {
            max-width: 850px;
            margin: 20px auto 0;
            background: white;
            padding: 18px;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        }

        .total {
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            color: #ff7f00;
        }

        .checkout-btn,
        .continue-btn {
            display: block;
            width: 100%;
            margin-top: 14px;
            padding: 15px;
            border: none;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .checkout-btn {
            background: #ff7f00;
        }

        .continue-btn {
            background: #2e7d32;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        }

        @media (max-width: 600px) {
            body {
                padding: 14px;
            }

            .cart-item {
                align-items: flex-start;
                gap: 12px;
                padding: 14px;
            }

            .cart-item img {
                width: 75px;
                height: 75px;
            }

            .cart-details h3 {
                font-size: 16px;
            }

            .remove-btn {
                padding: 7px 10px;
            }

            .summary-box {
                position: sticky;
                bottom: 0;
                border-radius: 18px 18px 0 0;
            }

            .total {
                text-align: center;
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<h2>Your Cart</h2>

<div class="cart-container" id="cart-container"></div>

<div class="summary-box" id="summary-box">
    <div class="total" id="total"></div>
    <button class="checkout-btn" id="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
    <button class="continue-btn" onclick="continueShopping()">Continue Shopping</button>
</div>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart") || []);
    const container = document.getElementById("cart-container");
    const totalDiv = document.getElementById("total");
    const checkoutBtn = document.getElementById("checkout-btn");
    const summaryBox = document.getElementById("summary-box");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = `<p class="empty">Your cart is empty</p>`;
        summaryBox.style.display = "none";
        return;
    }

    summaryBox.style.display = "block";
    checkoutBtn.style.display = "block";

    let total = 0;

    cart.forEach((item, index) => {
        const stock = Number(item.stock ?? 10);
        const itemTotal = Number(item.price) * Number(item.quantity);

        total += itemTotal;

        container.innerHTML += `
            <div class="cart-item">
                <img src="${item.image || 'https://via.placeholder.com/100'}">

                <div class="cart-details">
                    <h3>${item.name}</h3>
                    <p class="price">₹${item.price} × ${item.quantity} = ₹${itemTotal}</p>
                    <p class="stock">Available stock: ${stock}</p>

                    <div class="qty-controls">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)" ${item.quantity >= stock ? "disabled" : ""}>+</button>
                    </div>
                </div>

                <button class="remove-btn" onclick="removeItem(${index})">X</button>
            </div>
        `;
    });

    totalDiv.innerText = "Total: ₹" + total;
}

function changeQty(index, change) {
    let cart = JSON.parse(localStorage.getItem("cart") || []);
    const stock = Number(cart[index].stock ?? 10);

    if (change > 0 && cart[index].quantity >= stock) {
        alert("You cannot add more than available stock");
        return;
    }

    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart") || []);
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function checkout() {
    let cart = JSON.parse(localStorage.getItem("cart") || []);
}
