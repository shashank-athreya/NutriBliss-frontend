<!DOCTYPE html>
<html>
<head>
    <title>Cart - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #fffaf2;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        .cart-container {
            max-width: 800px;
            margin: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #fff8ed;
            border-radius: 10px;
        }

        .cart-details {
            flex: 1;
        }

        .cart-details h3 {
            margin-bottom: 5px;
        }

        .price {
            color: #ff7f00;
            font-weight: bold;
        }

        .qty-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .qty-controls button {
            padding: 5px 10px;
            border: none;
            background: #2e7d32;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .remove-btn {
            background: red;
            padding: 8px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .total {
            text-align: right;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        .checkout-btn {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            background: #ff7f00;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <h2>Your Cart</h2>

    <div class="cart-container" id="cart-container"></div>

    <div class="total" id="total"></div>

    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>

    <script>
        function loadCart() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            const container = document.getElementById("cart-container");
            const totalDiv = document.getElementById("total");

            container.innerHTML = "";

            if (cart.length === 0) {
                container.innerHTML = `<p class="empty">Your cart is empty</p>`;
                totalDiv.innerHTML = "";
                return;
            }

            let total = 0;

            cart.forEach((item, index) => {
                total += item.price * item.quantity;

                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}">
                        <div class="cart-details">
                            <h3>${item.name}</h3>
                            <p class="price">₹${item.price}</p>

                            <div class="qty-controls">
                                <button onclick="changeQty(${index}, -1)">-</button>
                                <span>${item.quantity}</span>
                                <button onclick="changeQty(${index}, 1)">+</button>
                            </div>
                        </div>

                        <button class="remove-btn" onclick="removeItem(${index})">X</button>
                    </div>
                `;
            });

            totalDiv.innerText = "Total: ₹" + total;
        }

        function changeQty(index, change) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart[index].quantity += change;

            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function removeItem(index) {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];

            cart.splice(index, 1);

            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        function checkout() {
            window.location.href = "checkout.html";
        }

        loadCart();
    </script>

</body>
</html>
