<!DOCTYPE html>
<html>
<head>
    <title>Cart - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #fffaf2;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #2e7d32;
        }

        .cart-container {
            max-width: 800px;
            margin: auto;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            background: #fff8ed;
            border-radius: 10px;
        }

        .cart-details {
            flex: 1;
        }

        .cart-details h3 {
            margin-bottom: 5px;
        }

        .price {
            color: #ff7f00;
            font-weight: bold;
        }

        .stock {
            font-size: 13px;
            color: #555;
            margin-top: 5px;
        }

        .qty-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            align-items: center;
        }

        .qty-controls button {
            padding: 5px 10px;
            border: none;
            background: #2e7d32;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .qty-controls button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .remove-btn {
            background: red;
            padding: 8px;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        .total {
            max-width: 800px;
            margin: 20px auto 0;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
        }

        .checkout-btn,
        .continue-btn {
            display: block;
            max-width: 800px;
            width: 100%;
            margin: 15px auto 0;
            padding: 14px;
            border: none;
            color: white;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        .checkout-btn {
            background: #ff7f00;
        }

        .continue-btn {
            background: #2e7d32;
            margin-top: 10px;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<h2>Your Cart</h2>

<div class="cart-container" id="cart-container"></div>

<div class="total" id="total"></div>

<button class="checkout-btn" id="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
<button class="continue-btn" onclick="continueShopping()">Continue Shopping</button>

<script>
function loadCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    const container = document.getElementById("cart-container");
    const totalDiv = document.getElementById("total");
    const checkoutBtn = document.getElementById("checkout-btn");

    container.innerHTML = "";

    if (cart.length === 0) {
        container.innerHTML = `<p class="empty">Your cart is empty</p>`;
        totalDiv.innerHTML = "";
        checkoutBtn.style.display = "none";
        return;
    }

    checkoutBtn.style.display = "block";

    let total = 0;

    cart.forEach((item, index) => {
        const stock = Number(item.stock ?? 10);
        const itemTotal = Number(item.price) * Number(item.quantity);

        total += itemTotal;

        container.innerHTML += `
            <div class="cart-item">
                <img src="${item.image || 'https://via.placeholder.com/100'}">

                <div class="cart-details">
                    <h3>${item.name}</h3>
                    <p class="price">₹${item.price}</p>
                    <p class="stock">Available stock: ${stock}</p>

                    <div class="qty-controls">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)" ${item.quantity >= stock ? "disabled" : ""}>+</button>
                    </div>
                </div>

                <button class="remove-btn" onclick="removeItem(${index})">X</button>
            </div>
        `;
    });

    totalDiv.innerText = "Total: ₹" + total;
}

function changeQty(index, change) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    const stock = Number(cart[index].stock ?? 10);

    if (change > 0 && cart[index].quantity >= stock) {
        alert("You cannot add more than available stock");
        return;
    }

    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    cart.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    loadCart();
}

function checkout() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    window.location.href = "checkout.html";
}

function continueShopping() {
    window.location.href = "index.html";
}

loadCart();
</script>

</body>
</html>
