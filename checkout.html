<!DOCTYPE html>
<html>
<head>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <title>Checkout - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #fffaf2;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        }

        h2, h3 { color: #2e7d32; }

        input, textarea {
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        .item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .summary-line {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            color: #555;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #ff7f00;
            margin-top: 15px;
            border-top: 1px solid #eee;
            padding-top: 12px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff7f00;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .cod-btn { background: #6d4c41; }
        .back-btn { background: #2e7d32; }

        .empty {
            text-align: center;
            color: #777;
        }

        .note {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
            line-height: 1.5;
        }

        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Checkout 🧾</h2>

<div class="container">

    <div class="box">
        <h3>Customer Details</h3>

        <input id="name" placeholder="Your Name">
        <input id="phone" placeholder="Phone Number">
        <textarea id="address" placeholder="Full Delivery Address"></textarea>

        <button id="pay-btn" onclick="placeOrder()">Pay Online</button>
        <button id="cod-btn" class="cod-btn" onclick="placeCOD()">Cash on Delivery (+₹30)</button>
        <button class="back-btn" onclick="goBack()">Back to Cart</button>

        <p class="note">
            Online payment has no extra COD charge. Cash on Delivery includes ₹30 handling charge.
        </p>
    </div>

    <div class="box">
        <h3>Order Summary</h3>
        <div id="order-items"></div>

        <div class="summary-line">
            <span>Cart Total</span>
            <strong id="cart-total">₹0</strong>
        </div>

        <div class="summary-line">
            <span>COD Charge</span>
            <strong>₹30</strong>
        </div>

        <div class="total" id="total">Online Total: ₹0</div>
        <p class="note">For COD, final total will be Cart Total + ₹30.</p>
    </div>

</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";
const RAZORPAY_KEY = "rzp_test_SjIBUI0g0xVx3p";
const COD_CHARGE = 30;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function calculateCartTotal() {
    let total = 0;
    cart.forEach(item => {
        total += Number(item.price) * Number(item.quantity);
    });
    return total;
}

function loadOrder() {
    const list = document.getElementById("order-items");
    const cartTotal = calculateCartTotal();

    list.innerHTML = "";

    if (cart.length === 0) {
        list.innerHTML = `<p class="empty">Your cart is empty</p>`;
        document.getElementById("cart-total").innerText = "₹0";
        document.getElementById("total").innerText = "Online Total: ₹0";
        return;
    }

    cart.forEach(item => {
        const itemTotal = Number(item.price) * Number(item.quantity);

        list.innerHTML += `
            <div class="item">
                <strong>${item.name}</strong><br>
                ₹${item.price} × ${item.quantity} = ₹${itemTotal}
            </div>
        `;
    });

    document.getElementById("cart-total").innerText = "₹" + cartTotal;
    document.getElementById("total").innerText = "Online Total: ₹" + cartTotal;
}

function getCustomerDetails() {
    const name = document.getElementById("name").value.trim();
    const address = document.getElementById("address").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (cart.length === 0) {
        alert("Your cart is empty");
        return null;
    }

    if (!name || !address || !phone) {
        alert("Please fill all details");
        return null;
    }

    if (phone.length < 10) {
        alert("Please enter a valid phone number");
        return null;
    }

    const cartTotal = calculateCartTotal();

    return { name, address, phone, cartTotal };
}

async function placeOrder() {
    const details = getCustomerDetails();
    if (!details) return;

    if (!window.Razorpay) {
        alert("Razorpay failed to load. Please refresh and try again.");
        return;
    }

    const payBtn = document.getElementById("pay-btn");
    payBtn.disabled = true;
    payBtn.innerText = "Creating payment...";

    let order;

    try {
        const res = await fetch(`${API_URL}/create-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount: details.cartTotal })
        });

        order = await res.json();

        if (!res.ok || !order.id) {
            alert(order.error || "Could not create payment order");
            payBtn.disabled = false;
            payBtn.innerText = "Pay Online";
            return;
        }

    } catch (err) {
        alert("Server error. Payment failed ❌");
        payBtn.disabled = false;
        payBtn.innerText = "Pay Online";
        return;
    }

    const options = {
        key: RAZORPAY_KEY,
        amount: order.amount,
        currency: "INR",
        name: "NutriBliss",
        description: "Dry Fruits Purchase",
        order_id: order.id,

        prefill: {
            name: details.name,
            contact: details.phone
        },

        theme: { color: "#ff7f00" },

        handler: async function (response) {
            try {
                const saveRes = await fetch(`${API_URL}/save-order`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        name: details.name,
                        address: details.address,
                        phone: details.phone,
                        cart,
                        total: details.cartTotal,
                        paymentId: response.razorpay_payment_id
                    })
                });

                if (!saveRes.ok) {
                    alert("Payment done, but order saving failed. Please contact support.");
                    return;
                }

                localStorage.removeItem("cart");
                window.location.href = `success.html?phone=${details.phone}`;

            } catch (error) {
                alert("Payment done, but order saving failed. Please contact support.");
            }
        },

        modal: {
            ondismiss: function () {
                payBtn.disabled = false;
                payBtn.innerText = "Pay Online";
            }
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
}

async function placeCOD() {
    const details = getCustomerDetails();
    if (!details) return;

    const codTotal = details.cartTotal + COD_CHARGE;

    const codBtn = document.getElementById("cod-btn");
    codBtn.disabled = true;
    codBtn.innerText = "Placing order...";

    try {
        const res = await fetch(`${API_URL}/save-order`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: details.name,
                address: details.address,
                phone: details.phone,
                cart,
                total: codTotal,
                paymentId: "COD"
            })
        });

        if (!res.ok) {
            alert("Order failed ❌");
            codBtn.disabled = false;
            codBtn.innerText = "Cash on Delivery (+₹30)";
            return;
        }

        localStorage.removeItem("cart");
        window.location.href = `success.html?phone=${details.phone}`;

    } catch (err) {
        alert("Order failed ❌");
        codBtn.disabled = false;
        codBtn.innerText = "Cash on Delivery (+₹30)";
    }
}

function goBack() {
    window.location.href = "cart.html";
}

loadOrder();
</script>

</body>
</html>
