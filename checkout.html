<!DOCTYPE html>
<html>
<head>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <title>Checkout - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #fffaf2;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 22px rgba(0,0,0,0.1);
        }

        h2, h3 {
            color: #2e7d32;
        }

        input, textarea {
            width: 100%;
            padding: 13px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            height: 90px;
            resize: none;
        }

        .item {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #ff7f00;
            margin-top: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ff7f00;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .back-btn {
            background: #2e7d32;
        }

        .empty {
            text-align: center;
            color: #777;
        }

        @media (max-width: 700px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Checkout 🧾</h2>

<div class="container">

    <div class="box">
        <h3>Customer Details</h3>

        <input id="name" placeholder="Your Name">
        <input id="phone" placeholder="Phone Number">
        <textarea id="address" placeholder="Full Delivery Address"></textarea>

        <button id="pay-btn" onclick="placeOrder()">Pay & Place Order</button>
        <button class="back-btn" onclick="goBack()">Back to Cart</button>
    </div>

    <div class="box">
        <h3>Order Summary</h3>
        <div id="order-items"></div>
        <div class="total" id="total">Total: ₹0</div>
    </div>

</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";

// IMPORTANT: This key must match the same Razorpay account as your backend secret in Render
const RAZORPAY_KEY = "rzp_test_SjIBUI0g0xVx3p";

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadOrder() {
    const list = document.getElementById("order-items");
    let total = 0;

    list.innerHTML = "";

    if (cart.length === 0) {
        list.innerHTML = `<p class="empty">Your cart is empty</p>`;
        document.getElementById("total").innerText = "Total: ₹0";
        return;
    }

    cart.forEach(item => {
        total += Number(item.price) * Number(item.quantity);

        list.innerHTML += `
            <div class="item">
                <strong>${item.name}</strong><br>
                ₹${item.price} × ${item.quantity} = ₹${Number(item.price) * Number(item.quantity)}
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₹" + total;
}

async function placeOrder() {
    const payBtn = document.getElementById("pay-btn");

    const name = document.getElementById("name").value.trim();
    const address = document.getElementById("address").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (cart.length === 0) {
        alert("Your cart is empty");
        return;
    }

    if (!name || !address || !phone) {
        alert("Please fill all details");
        return;
    }

    if (phone.length < 10) {
        alert("Please enter a valid phone number");
        return;
    }

    if (!window.Razorpay) {
        alert("Razorpay failed to load. Please refresh and try again.");
        return;
    }

    let total = 0;
    cart.forEach(item => {
        total += Number(item.price) * Number(item.quantity);
    });

    payBtn.disabled = true;
    payBtn.innerText = "Creating payment...";

    let order;

    try {
        const res = await fetch(`${API_URL}/create-order`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ amount: total })
        });

        order = await res.json();
        console.log("Razorpay order:", order);

        if (!res.ok || !order.id) {
            console.error("Create order error:", order);
            alert(order.error || "Could not create payment order");
            payBtn.disabled = false;
            payBtn.innerText = "Pay & Place Order";
            return;
        }

    } catch (err) {
        console.error("Server error:", err);
        alert("Server error. Payment failed ❌");
        payBtn.disabled = false;
        payBtn.innerText = "Pay & Place Order";
        return;
    }

    const options = {
        key: RAZORPAY_KEY,
        amount: order.amount,
        currency: "INR",
        name: "NutriBliss",
        description: "Dry Fruits Purchase",
        order_id: order.id,

        prefill: {
            name: name,
            contact: phone
        },

        theme: {
            color: "#ff7f00"
        },

        handler: async function (response) {
            try {
                const saveRes = await fetch(`${API_URL}/save-order`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name,
                        address,
                        phone,
                        cart,
                        total,
                        paymentId: response.razorpay_payment_id
                    })
                });

                if (!saveRes.ok) {
                    alert("Payment done, but order saving failed. Please contact support.");
                    return;
                }

                localStorage.removeItem("cart");
                window.location.href = `success.html?phone=${phone}`;

            } catch (error) {
                console.error("Save order error:", error);
                alert("Payment done, but order saving failed. Please contact support.");
            }
        },

        modal: {
            ondismiss: function () {
                payBtn.disabled = false;
                payBtn.innerText = "Pay & Place Order";
            }
        }
    };

    const rzp = new Razorpay(options);
    rzp.open();
}

function goBack() {
    window.location.href = "cart.html";
}

loadOrder();
</script>

</body>
</html>
