<!DOCTYPE html>
<html>
<head>
    <title>NutriBliss Dry Fruits</title>

    <style>
        .products {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            width: 220px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        
        .card:hover {
            transform: scale(1.05);
        }
        
        button {
            margin-top: 10px;
            padding: 10px;
            background: #ff7f00;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>NutriBliss Dry Fruits</h2>
        <div class="nav-links">
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        </div>
    </div>

    <!-- Products -->
    <div class="container">
        <h2>Our Products</h2>

        <div class="products" id="product-list">

           

        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        
        updateCartCount();
        
        // ✅ Fetch products from backend
        fetch("https://nutribliss-backend-3.onrender.com/products")
            .then(res => res.json())
            .then(data => {
                let productList = document.getElementById("product-list");
        
                data.forEach(product => {
                    let div = document.createElement("div");
                    div.className = "card";
        
                    div.innerHTML = `
                        <img src="${product.image || 'https://via.placeholder.com/200'}">
                        <h3>${product.name}</h3>
                        <p>₹${product.price}/kg</p>
                        <button class="buy-btn">Buy Now</button>
                        `;
                        div.querySelector(".buy-btn").addEventListener("click", () => {
                        addToCart(product);
                        });
                    productList.appendChild(div);
                });
            });
        
        // Cart functions
        function updateCartCount() {
            let cart = JSON.parse(localStorage.getItem("cart")) || [];
            document.getElementById("cart-count").innerText = cart.length;
        }
        
        function addToCart(product) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.name === product.name);

    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({
            id: Date.now(),
            name: product.name,
            price: product.price,
            image: product.image,
            quantity: 1
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartCount();
}
        
        function updateCart() {
            document.getElementById("cart-count").innerText = cart.length;
        }
        </script>
</body>
</html>
