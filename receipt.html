<!DOCTYPE html>
<html>
<head>
    <title>Receipt - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            margin: 0;
            padding: 24px;
            color: #333;
        }

        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 28px;
            border-radius: 22px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
        }

        h1, h2 {
            color: #1b5e20;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 12px;
            font-size: 16px;
        }

        button, a {
            display: block;
            width: 100%;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 12px;
            font-size: 16px;
        }

        button { background: #1b5e20; color: white; }
        .home { background: #ff7f00; color: white; }
        .print-btn { background: #1976d2; color: white; }

        .receipt-card {
            margin-top: 25px;
            padding: 22px;
            border-radius: 18px;
            background: #fffaf2;
            border-left: 6px solid #1b5e20;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid #eadfce;
            padding: 9px 0;
        }

        .items {
            margin-top: 14px;
            background: white;
            padding: 14px;
            border-radius: 14px;
        }

        .item-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .item-row:last-child {
            border-bottom: none;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            color: #ff7f00;
            margin-top: 15px;
            text-align: right;
        }

        .error {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        .success {
            color: #1b5e20;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        @media(max-width: 600px) {
            body { padding: 14px; }
            .container { padding: 20px; }
            .receipt-row { flex-direction: column; }
        }

        @media print {
            input, button, .home, .print-btn, .intro {
                display: none;
            }

            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>NutriBliss Receipt</h1>
    <p class="intro" style="text-align:center;">Enter your phone number to view your latest order receipt.</p>

    <input type="text" id="phone" placeholder="Enter phone number">

    <button onclick="loadReceipt()">Get Receipt</button>
    <button class="print-btn" onclick="window.print()">Print / Save as PDF</button>
    <a class="home" href="index.html">Back to Home</a>

    <div id="result"></div>
</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";

const params = new URLSearchParams(window.location.search);
const phoneFromUrl = params.get("phone");

if (phoneFromUrl) {
    document.getElementById("phone").value = phoneFromUrl;
    loadReceipt();
}

function isCOD(order) {
    return order.paymentId === "COD";
}

async function loadReceipt() {
    const phone = document.getElementById("phone").value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "";

    if (!phone) {
        result.innerHTML = `<p class="error">Please enter phone number</p>`;
        return;
    }

    try {
        const res = await fetch(`${API_URL}/track-order/${phone}`);
        const orders = await res.json();

        if (!res.ok || !orders || orders.length === 0) {
            result.innerHTML = `<p class="error">No receipt found for this phone number.</p>`;
            return;
        }

        const order = orders[0];

        let itemsHtml = "";

        if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
                const itemTotal = Number(item.price) * Number(item.quantity);

                itemsHtml += `
                    <div class="item-row">
                        <strong>${item.name}</strong><br>
                        ₹${item.price} × ${item.quantity} = ₹${itemTotal}
                    </div>
                `;
            });
        } else {
            itemsHtml = "<p>No items found</p>";
        }

        const paymentMethod = isCOD(order) ? "Cash on Delivery" : "Online Payment";

        result.innerHTML = `
            <p class="success">Receipt generated successfully</p>

            <div class="receipt-card">
                <h2>Order Receipt</h2>

                <div class="receipt-row"><strong>Customer</strong><span>${order.name}</span></div>
                <div class="receipt-row"><strong>Phone</strong><span>${order.phone}</span></div>
                <div class="receipt-row"><strong>Address</strong><span>${order.address || "N/A"}</span></div>
                <div class="receipt-row"><strong>Date</strong><span>${new Date(order.date).toLocaleString()}</span></div>
                <div class="receipt-row"><strong>Status</strong><span>${order.status}</span></div>
                <div class="receipt-row"><strong>Payment</strong><span>${paymentMethod}</span></div>

                ${!isCOD(order) ? `<div class="receipt-row"><strong>Payment ID</strong><span>${order.paymentId || "N/A"}</span></div>` : ""}

                <div class="items">
                    <strong>Items Ordered:</strong>
                    ${itemsHtml}
                </div>

                <p class="total">Total Paid / Payable: ₹${order.total}</p>
            </div>
        `;

    } catch (err) {
        result.innerHTML = `<p class="error">Something went wrong. Try again.</p>`;
    }
}
</script>

</body>
</html>
