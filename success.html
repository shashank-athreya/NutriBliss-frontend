<!DOCTYPE html>
<html>
<head>
    <title>Order Success - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fffaf2, #eef8ee);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .success-box {
            background: white;
            max-width: 540px;
            width: 100%;
            padding: 35px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
        }

        .icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        h1 {
            color: #1b5e20;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        a {
            display: block;
            margin-top: 14px;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
        }

        .track { background: #ff7f00; color: white; }
        .receipt { background: #1976d2; color: white; }
        .whatsapp { background: #25d366; color: white; }
        .shop { background: #2e7d32; color: white; }

        .small {
            font-size: 13px;
            color: #777;
            margin-top: 14px;
        }
    </style>
</head>

<body>

<div class="success-box">
    <div class="icon">✅</div>

    <h1>Order Placed Successfully!</h1>
    <p>Your NutriBliss order has been received.</p>
    <p>You can track your order, view receipt, or confirm on WhatsApp.</p>

    <a class="track" id="track-link" href="track-order.html">Track My Order</a>
    <a class="receipt" id="receipt-link" href="receipt.html">View Receipt</a>
    <a class="whatsapp" id="whatsapp-link" href="#">Confirm on WhatsApp</a>
    <a class="shop" href="index.html">Continue Shopping</a>

    <p class="small">Thank you for choosing NutriBliss.</p>
</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";
const WHATSAPP_NUMBER = "918277148677";

const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");
const name = params.get("name") || "Customer";

if (phone) {
    document.getElementById("track-link").href = `track-order.html?phone=${phone}`;
    document.getElementById("receipt-link").href = `receipt.html?phone=${phone}`;

    loadWhatsAppMessage(phone);
}

async function loadWhatsAppMessage(phone) {
    const whatsappLink = document.getElementById("whatsapp-link");

    try {
        const res = await fetch(`${API_URL}/track-order/${phone}`);
        const orders = await res.json();

        if (!res.ok || !orders || orders.length === 0) {
            const message = 
                `Hi NutriBliss 👋

                Name: ${phone}  
                Phone: ${phone}

                I have placed an order. Please confirm.

                Thank you!`;
            whatsappLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(fallbackMessage)}`;
            return;
        }

        const latestOrder = orders[0];

        let itemsText = "";

        if (latestOrder.items && latestOrder.items.length > 0) {
            latestOrder.items.forEach(item => {
                itemsText += `\n- ${item.name} x ${item.quantity} = ₹${Number(item.price) * Number(item.quantity)}`;
            });
        }

        const paymentMethod = latestOrder.paymentId === "COD"
            ? "Cash on Delivery"
            : "Online Payment";

        const message =
`Hi NutriBliss, I placed an order.

Phone: ${latestOrder.phone}
Customer: ${latestOrder.name}
Payment: ${paymentMethod}
Total: ₹${latestOrder.total}
Status: ${latestOrder.status}

Items:${itemsText}

Please confirm my order.`;

        whatsappLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;

    } catch (error) {
        const fallbackMessage = `Hi NutriBliss, I placed an order. My phone number is ${phone}.`;
        whatsappLink.href = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(fallbackMessage)}`;
    }
}
</script>

</body>
</html>
