<!DOCTYPE html>
<html>
<head>
    <title>Order Success - NutriBliss</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fffaf2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .success-box {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 28px rgba(0,0,0,0.12);
        }

        .icon {
            font-size: 55px;
            margin-bottom: 15px;
        }

        h1 {
            color: #2e7d32;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        a {
            display: block;
            margin-top: 14px;
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .track {
            background: #ff7f00;
            color: white;
        }

        .whatsapp {
            background: #25d366;
            color: white;
        }

        .shop {
            background: #2e7d32;
            color: white;
        }
    </style>
</head>

<body>

<div class="success-box">
    <div class="icon">✅</div>

    <h1>Order Placed Successfully!</h1>
    <p>Your payment was successful and your NutriBliss order has been received.</p>
    <p>You can track your order using your phone number.</p>

    <a class="track" id="track-link">Track My Order</a>
    <a class="track" id="receipt-link">View Receipt</a>

    <a id="whatsapp-link" class="whatsapp">
        Confirm on WhatsApp
    </a>

    <a class="shop" href="index.html">Continue Shopping</a>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const phone = params.get("phone");

// 🔁 IMPORTANT: Replace with your WhatsApp number
const WHATSAPP_NUMBER = "+918277148677";

if (phone) {

    // Track order link
    document.getElementById("track-link").href =
        `track-order.html?phone=${phone}`;

    // WhatsApp message
    const message =
        `Hi NutriBliss, I placed an order. My phone number is ${phone}.`;

    // WhatsApp link
    document.getElementById("whatsapp-link").href =
        `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`;
    
    document.getElementById("receipt-link").href = 'receipt.html?phone=$(phone)';
}
</script>

</body>
</html>
