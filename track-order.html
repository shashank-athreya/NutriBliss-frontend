<!DOCTYPE html>
<html>
<head>
  <title>Track Order - NutriBliss</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fffaf2, #eef8ee);
      margin: 0;
      padding: 24px;
      color: #333;
    }

    .container {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 28px;
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.1);
    }

    h2 {
      color: #1b5e20;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 15px 0;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
    }

    button, .home-btn {
      width: 100%;
      display: block;
      padding: 14px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 12px;
      font-size: 16px;
    }

    button {
      background: #1b5e20;
      color: white;
    }

    .home-btn {
      background: #ff7f00;
      color: white;
    }

    .order-card {
      margin-top: 22px;
      padding: 22px;
      border-radius: 18px;
      background: #fffaf2;
      border-left: 6px solid #1b5e20;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .order-card p {
      margin: 8px 0;
    }

    .status-badge,
    .payment-badge {
      padding: 6px 11px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      display: inline-block;
      font-size: 13px;
    }

    .status-pending { background: #fbc02d; color: #333; }
    .status-processing { background: #1976d2; }
    .status-shipped { background: #7b1fa2; }
    .status-delivered { background: #2e7d32; }
    .status-cancelled { background: #d32f2f; }

    .payment-cod { background: #6d4c41; }
    .payment-online { background: #1565c0; }

    .timeline-container {
      display: flex;
      justify-content: space-between;
      margin: 22px 0;
      gap: 10px;
      position: relative;
    }

    .step {
      text-align: center;
      flex: 1;
      position: relative;
    }

    .circle {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #ccc;
      margin: auto;
      line-height: 34px;
      color: white;
      font-size: 15px;
      font-weight: bold;
    }

    .step.active .circle {
      background: #2e7d32;
    }

    .step.current .circle {
      background: #ff7f00;
    }

    .step p {
      font-size: 12px;
      margin-top: 7px;
      font-weight: bold;
      color: #555;
    }

    .cancelled-box {
      background: #ffebee;
      color: #d32f2f;
      padding: 13px;
      border-radius: 12px;
      font-weight: bold;
      margin: 16px 0;
      text-align: center;
    }

    .items {
      margin-top: 14px;
      padding: 14px;
      background: white;
      border-radius: 14px;
      border: 1px solid #f1e5d0;
    }

    .item-row {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .item-row:last-child {
      border-bottom: none;
    }

    .error {
      color: red;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      color: #1b5e20;
      margin-top: 15px;
      text-align: center;
      font-weight: bold;
    }

    @media(max-width: 600px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 20px;
      }

      .timeline-container {
        flex-direction: column;
      }

      .step {
        display: flex;
        align-items: center;
        gap: 12px;
        text-align: left;
      }

      .circle {
        margin: 0;
        flex-shrink: 0;
      }

      .step p {
        margin: 0;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Track Your Order</h2>
  <p style="text-align:center;">Enter your phone number to check your NutriBliss order status.</p>

  <input type="tel" id="phone" placeholder="Enter phone number" inputmode="numeric">

  <button onclick="trackOrder()">Track Order</button>
  <a class="home-btn" href="index.html">Continue Shopping</a>

  <div id="result"></div>
</div>

<script>
const API_URL = "https://nutribliss-backend-4.onrender.com";

const params = new URLSearchParams(window.location.search);
const phoneFromUrl = params.get("phone");

if (phoneFromUrl){
  document.getElementById("phone").value = phoneFromUrl;
  loadOrders();
}

if (phoneFromUrl) {
  document.getElementById("phone").value = phoneFromUrl;
  document.getElementById("phone").focus();
  trackOrder();
}

const steps = ["Pending", "Processing", "Shipped", "Delivered"];

function getStatusClass(status) {
  if (status === "Pending") return "status-pending";
  if (status === "Processing") return "status-processing";
  if (status === "Shipped") return "status-shipped";
  if (status === "Delivered") return "status-delivered";
  if (status === "Cancelled") return "status-cancelled";
  return "status-pending";
}

function getTimeline(status) {
  if (status === "Cancelled") {
    return `<div class="cancelled-box">Order Cancelled</div>`;
  }

  const currentIndex = steps.indexOf(status);

  let html = `<div class="timeline-container">`;

  steps.forEach((step, index) => {
    let className = "step";

    if (index < currentIndex) {
      className += " active";
    }

    if (index === currentIndex) {
      className += " current";
    }

    html += `
      <div class="${className}">
        <div class="circle">${index <= currentIndex ? "✓" : ""}</div>
        <p>${step}</p>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function isCOD(order) {
  return order.paymentId === "COD";
}

async function trackOrder() {
  const phone = document.getElementById("phone").value.trim();
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  if (!phone) {
    result.innerHTML = `<p class="error">Please enter phone number</p>`;
    return;
  }

  if (!/^[6-9]\d{9}$/.test(phone)) {
    result.innerHTML = `<p class="error">Please enter a valid 10-digit phone number</p>`;
    return;
  }

  try {
    const res = await fetch(`${API_URL}/track-order/${phone}`);
    const data = await res.json();

    if (!res.ok) {
      result.innerHTML = `<p class="error">${data.message || "No orders found"}</p>`;
      return;
    }

    let html = `<p class="success">${data.length} order(s) found</p>`;

    data.forEach(order => {
      let itemsHtml = "";

      if (order.items && order.items.length > 0) {
        order.items.forEach(item => {
          const itemTotal = Number(item.price) * Number(item.quantity);

          itemsHtml += `
            <div class="item-row">
              <strong>${item.name}</strong><br>
              ₹${item.price} × ${item.quantity} = ₹${itemTotal}
            </div>
          `;
        });
      } else {
        itemsHtml = "<p>No items found</p>";
      }

      const paymentMethod = isCOD(order) ? "Cash on Delivery" : "Online Payment";
      const paymentClass = isCOD(order) ? "payment-cod" : "payment-online";

      html += `
        <div class="order-card">
          <p><strong>Name:</strong> ${order.name}</p>
          <p><strong>Phone:</strong> ${order.phone}</p>
          <p><strong>Total:</strong> ₹${order.total}</p>

          <p>
            <strong>Payment Method:</strong>
            <span class="payment-badge ${paymentClass}">
              ${paymentMethod}
            </span>
          </p>

          ${!isCOD(order) ? `<p><strong>Payment ID:</strong> ${order.paymentId || "N/A"}</p>` : ""}

          <p>
            <strong>Status:</strong>
            <span class="status-badge ${getStatusClass(order.status)}">
              ${order.status}
            </span>
          </p>

          ${getTimeline(order.status)}

          <p><strong>Date:</strong> ${new Date(order.date).toLocaleString()}</p>

          <div class="items">
            <strong>Items Ordered:</strong>
            ${itemsHtml}
          </div>
        </div>
      `;
    });

    result.innerHTML = html;

  } catch (error) {
    result.innerHTML = `<p class="error">Something went wrong. Try again.</p>`;
  }
}
</script>

</body>
</html>
